<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lavyan</title>

<style>

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:radial-gradient(circle at top,#020617,#000);
    color:white;
    overflow-x:hidden;
}

/* INTRO SCREEN */

.intro{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:999;
    animation:fadeOut 4s forwards;
}

.logo{
    font-size:60px;
    font-weight:bold;
    color:cyan;
    text-shadow:0 0 20px cyan,0 0 40px blue;
    animation:glitch 1s infinite alternate;
}

@keyframes glitch{
    0%{transform:translate(0);}
    20%{transform:translate(-2px,2px);}
    40%{transform:translate(2px,-2px);}
    60%{transform:translate(-1px,1px);}
    80%{transform:translate(1px,-1px);}
    100%{transform:translate(0);}
}

.loading{
    width:220px;
    height:6px;
    background:#111;
    margin-top:20px;
    border-radius:10px;
    overflow:hidden;
}

.loading div{
    width:0%;
    height:100%;
    background:cyan;
    animation:load 3s linear forwards;
}

@keyframes load{
    to{
        width:100%;
    }
}

@keyframes fadeOut{
    0%{
        opacity:1;
    }

    85%{
        opacity:1;
    }

    100%{
        opacity:0;
        visibility:hidden;
    }
}

/* HEADER */

h1{
    text-align:center;
    margin-top:30px;
    text-shadow:0 0 15px cyan;
    font-size:40px;
}

/* SEARCH */

.search-box{
    text-align:center;
    margin:25px;
    position:relative;
}

input{
    width:80%;
    max-width:420px;
    padding:14px;
    border:none;
    outline:none;
    border-radius:30px;
    font-size:16px;
    box-shadow:0 0 12px cyan;
}

/* SUGGESTIONS */

.suggestions{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    width:80%;
    max-width:420px;
    background:#0f172a;
    border-radius:12px;
    overflow:hidden;
    display:none;
    box-shadow:0 0 12px cyan;
}

.suggestions div{
    padding:12px;
    cursor:pointer;
    transition:0.3s;
}

.suggestions div:hover{
    background:#1e293b;
}

/* GRID */

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:20px;
    padding:25px;
}

/* APP BOX */

.app{
    padding:25px;
    border-radius:15px;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
    font-weight:bold;
    font-size:18px;
}

.app:hover{
    transform:scale(1.08);
    box-shadow:0 0 20px cyan;
}

/* COLORS */

.youtube{
    background:red;
}

.instagram{
    background:purple;
}

.facebook{
    background:#1877f2;
}

.whatsapp{
    background:#25d366;
}

.twitter{
    background:#1da1f2;
}

.amazon{
    background:#ff9900;
}

/* FOOTER */

footer{
    text-align:center;
    padding:20px;
    opacity:0.7;
}

</style>
</head>

<body>

<!-- INTRO -->

<div class="intro">

    <div class="logo">
        LAVYAN
    </div>

    <div class="loading">
        <div></div>
    </div>

</div>

<!-- TITLE -->

<h1>Modern App Launcher 🚀</h1>

<!-- SEARCH -->

<div class="search-box">

    <input 
    type="text"
    id="search"
    placeholder="Search apps..."
    onkeyup="showSuggestions()">

    <div class="suggestions" id="suggestions"></div>

</div>

<!-- APPS -->

<div class="grid">

    <div class="app youtube" onclick="openApp('youtube')">
        YouTube
    </div>

    <div class="app instagram" onclick="openApp('instagram')">
        Instagram
    </div>

    <div class="app facebook" onclick="openApp('facebook')">
        Facebook
    </div>

    <div class="app whatsapp" onclick="openApp('whatsapp')">
        WhatsApp
    </div>

    <div class="app twitter" onclick="openApp('twitter')">
        Twitter
    </div>

    <div class="app amazon" onclick="openApp('amazon')">
        Amazon
    </div>

</div>

<footer>
    Created by Lavyan ⚡
</footer>

<script>

const apps = {

    youtube:"https://www.youtube.com/",

    instagram:"https://www.instagram.com/",

    facebook:"https://www.facebook.com/",

    whatsapp:"https://web.whatsapp.com/",

    twitter:"https://twitter.com/",

    amazon:"https://www.amazon.in/"

};

function openApp(name){

    window.open(apps[name], "_blank");

}

/* SEARCH FUNCTION */

function showSuggestions(){

    let input =
    document.getElementById("search")
    .value.toLowerCase();

    let box =
    document.getElementById("suggestions");

    box.innerHTML = "";

    if(!input){

        box.style.display = "none";
        return;

    }

    let results =
    Object.keys(apps).filter(app =>
    app.includes(input));

    if(results.length === 0){

        box.style.display = "none";
        return;

    }

    results.forEach(app => {

        let div =
        document.createElement("div");

        div.textContent = app;

        div.onclick = () => {

            document.getElementById("search")
            .value = app;

            box.style.display = "none";

            openApp(app);

        };

        box.appendChild(div);

    });

    box.style.display = "block";

}

</script>

</body>
</html>
